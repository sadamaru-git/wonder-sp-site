<!doctype html>
<html lang="ja">
<head>

    <!-- ===== favicon ===== -->
  <link rel="icon" href="assets/images/favicon.svg?v=2" type="image/svg+xml">
  <link rel="icon" type="image/png" href="assets/images/favicon-32.png?v=3" sizes="32x32">
  <link rel="icon" type="image/png" href="assets/images/favicon-16.png?v=3" sizes="16x16">
  <link rel="icon" href="assets/images/favicon-ico.ico" sizes="any">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wonder in Ekoda(previewSP)</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background-image:url(assets/images/tmpBG_previewSP.webp);
      background-size:contain;
      background-repeat: repeat;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
    }
    .phone{
      width:390px;           /* iPhone 14/15あたりの幅 */
      height:844px;          /* 高さ */
      border-radius:32px;
      background:#000;
      padding:12px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .screen{
      width:100%;
      height:100%;
      border-radius:24px;
      overflow:hidden;
      background:#fff;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
    }
    /* 画面が小さいPCのときは縮小して収める */
    @media (max-height: 900px){
      .phone{ transform: scale(.9); transform-origin: center; }
    }
    @media (max-height: 820px){
      .phone{ transform: scale(.8); }
    }
  </style>
</head>
<body>
  <div class="phone" aria-label="スマホ表示プレビュー">
    <div class="screen">
      <iframe id="spFrame" src="./index.html?preview=1"></iframe>
    </div>
  </div>
</body>

  <script src="assets/js/previewSP.js"></script>
</html>
